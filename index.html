<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>Team Stairs Tracker</title>
<style>
  :root {
    --bg-deep: #0f172a;
    --bg-card: #1e293b;
    --bg-card-hover: #24334a;
    --accent-blue: #38bdf8;
    --accent-green: #4ade80;
    --text-primary: #f1f5f9;
    --text-secondary: #94a3b8;
    --border-subtle: rgba(148, 163, 184, 0.15);
  }

  * {
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
  }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg-deep);
    background-image:
      radial-gradient(circle at 15% 0%, rgba(56, 189, 248, 0.12), transparent 40%),
      radial-gradient(circle at 85% 15%, rgba(74, 222, 128, 0.08), transparent 45%);
    color: var(--text-primary);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }

  .wrap {
    max-width: 640px;
    margin: 0 auto;
    padding: 24px 16px 100px;
  }

  header {
    text-align: center;
    margin-bottom: 24px;
  }

  header h1 {
    font-size: 26px;
    font-weight: 800;
    letter-spacing: -0.02em;
    margin: 0 0 4px;
    background: linear-gradient(90deg, var(--accent-blue), #7dd3fc);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }

  header p {
    color: var(--text-secondary);
    font-size: 13px;
    margin: 0;
  }

  .status-pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: var(--text-secondary);
    margin-top: 10px;
    padding: 4px 10px;
    border-radius: 999px;
    background: rgba(148, 163, 184, 0.08);
    border: 1px solid var(--border-subtle);
  }

  .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--accent-green);
    box-shadow: 0 0 8px var(--accent-green);
  }
  .dot.offline { background: #f87171; box-shadow: 0 0 8px #f87171; }

  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 16px;
  }

  .card {
    background: linear-gradient(160deg, var(--bg-card), #182236);
    border: 1px solid var(--border-subtle);
    border-radius: 18px;
    padding: 18px;
  }

  .card-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-secondary);
    font-weight: 600;
    margin-bottom: 6px;
  }

  .card-value {
    font-size: 26px;
    font-weight: 800;
    letter-spacing: -0.02em;
    font-variant-numeric: tabular-nums;
  }

  .card-value.blue { color: var(--accent-blue); }
  .card-value.green { color: var(--accent-green); }

  .target-card {
    grid-column: 1 / -1;
    text-align: center;
    background: linear-gradient(160deg, #1a2740, #131f34);
    border: 1px solid rgba(56, 189, 248, 0.25);
  }
  .target-card .card-value {
    font-size: 30px;
    color: var(--text-primary);
  }

  .remaining-card.achieved {
    background: linear-gradient(160deg, rgba(74, 222, 128, 0.18), rgba(74, 222, 128, 0.05));
    border: 1px solid rgba(74, 222, 128, 0.4);
    grid-column: 1 / -1;
    text-align: center;
    animation: pulse-glow 1.8s ease-in-out infinite;
  }
  .remaining-card.achieved .card-value {
    color: var(--accent-green);
    font-size: 22px;
  }

  @keyframes pulse-glow {
    0%, 100% { box-shadow: 0 0 0 rgba(74, 222, 128, 0); }
    50% { box-shadow: 0 0 24px rgba(74, 222, 128, 0.35); }
  }

  .progress-wrap {
    margin: 4px 0 24px;
  }

  .progress-track {
    width: 100%;
    height: 14px;
    border-radius: 999px;
    background: rgba(148, 163, 184, 0.12);
    overflow: hidden;
    border: 1px solid var(--border-subtle);
  }

  .progress-fill {
    height: 100%;
    border-radius: 999px;
    background: linear-gradient(90deg, var(--accent-blue), var(--accent-green));
    width: 0%;
    transition: width 0.6s cubic-bezier(0.22, 1, 0.36, 1);
    box-shadow: 0 0 12px rgba(56, 189, 248, 0.5);
  }

  .progress-pct {
    text-align: center;
    font-size: 13px;
    color: var(--text-secondary);
    margin-top: 8px;
    font-weight: 600;
  }

  .section-title {
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-secondary);
    font-weight: 700;
    margin: 28px 0 12px;
  }

  .teammate-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .teammate-row {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--bg-card);
    border: 1px solid var(--border-subtle);
    border-radius: 16px;
    padding: 12px 14px;
    transition: background 0.2s;
  }

  .avatar {
    width: 38px;
    height: 38px;
    min-width: 38px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent-blue), #0ea5e9);
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 800;
    font-size: 15px;
    color: #04121f;
  }

  .row-main {
    flex: 1;
    min-width: 0;
  }

  .name-field {
    font-size: 15px;
    font-weight: 700;
    color: var(--text-primary);
    background: transparent;
    border: none;
    border-bottom: 1px solid transparent;
    padding: 2px 0;
    width: 100%;
    outline: none;
    font-family: inherit;
  }
  .name-field:focus {
    border-bottom: 1px solid var(--accent-blue);
  }

  .steps-field {
    font-size: 13px;
    color: var(--accent-blue);
    background: rgba(56, 189, 248, 0.08);
    border: 1px solid rgba(56, 189, 248, 0.2);
    border-radius: 8px;
    padding: 6px 8px;
    width: 100px;
    outline: none;
    font-family: inherit;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
  }
  .steps-field:focus {
    border-color: var(--accent-blue);
    background: rgba(56, 189, 248, 0.14);
  }

  .clear-btn {
    width: 30px;
    height: 30px;
    min-width: 30px;
    border-radius: 50%;
    border: 1px solid var(--border-subtle);
    background: rgba(248, 113, 113, 0.08);
    color: #f87171;
    font-size: 14px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    line-height: 1;
  }
  .clear-btn:active {
    background: rgba(248, 113, 113, 0.25);
  }

  .delete-btn {
    width: 30px;
    height: 30px;
    min-width: 30px;
    border-radius: 50%;
    border: 1px solid var(--border-subtle);
    background: rgba(148, 163, 184, 0.1);
    color: var(--text-secondary);
    font-size: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    line-height: 1;
  }
  .delete-btn:active {
    background: rgba(148, 163, 184, 0.25);
  }

  .empty-state {
    text-align: center;
    color: var(--text-secondary);
    font-size: 13px;
    padding: 30px 10px;
    border: 1px dashed var(--border-subtle);
    border-radius: 16px;
  }

  .add-btn-wrap {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 14px 16px calc(14px + env(safe-area-inset-bottom));
    background: linear-gradient(180deg, transparent, var(--bg-deep) 30%);
    display: flex;
    justify-content: center;
  }

  .add-btn {
    max-width: 608px;
    width: 100%;
    background: linear-gradient(90deg, var(--accent-blue), #0ea5e9);
    color: #04121f;
    border: none;
    border-radius: 16px;
    padding: 15px;
    font-size: 15px;
    font-weight: 800;
    letter-spacing: 0.01em;
    cursor: pointer;
    box-shadow: 0 8px 24px rgba(56, 189, 248, 0.35);
  }
  .add-btn:active {
    transform: scale(0.98);
  }
  .add-btn:disabled {
    opacity: 0.6;
  }

  .toast {
    position: fixed;
    top: 16px;
    left: 50%;
    transform: translateX(-50%) translateY(-20px);
    background: #1e293b;
    border: 1px solid var(--border-subtle);
    color: var(--text-primary);
    padding: 10px 18px;
    border-radius: 12px;
    font-size: 13px;
    font-weight: 600;
    opacity: 0;
    transition: all 0.3s ease;
    pointer-events: none;
    z-index: 100;
    white-space: nowrap;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
  .toast.error {
    border-color: rgba(248, 113, 113, 0.4);
    color: #f87171;
  }
</style>
</head>
<body>

<div class="wrap">
  <header>
    <h1>🪜 Team Stairs Tracker</h1>
    <p>Live progress toward the team goal</p>
    <div class="status-pill">
      <span class="dot" id="statusDot"></span>
      <span id="statusText">Connecting…</span>
    </div>
  </header>

  <div class="stats-grid">
    <div class="card target-card">
      <div class="card-label">Team Goal</div>
      <div class="card-value" id="targetValue">300,000</div>
    </div>

    <div class="card">
      <div class="card-label">Live Total</div>
      <div class="card-value blue" id="totalValue">0</div>
    </div>

    <div class="card" id="remainingCardWrap">
      <div class="card-label" id="remainingLabel">Stairs Remaining</div>
      <div class="card-value" id="remainingValue">300,000</div>
    </div>
  </div>

  <div class="progress-wrap">
    <div class="progress-track">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    <div class="progress-pct" id="progressPct">0% complete</div>
  </div>

  <div class="section-title">Teammates</div>
  <div class="teammate-list" id="teammateList">
    <div class="empty-state" id="emptyState">No teammates yet. Add one below to get started.</div>
  </div>
</div>

<div class="add-btn-wrap">
  <button class="add-btn" id="addBtn">+ Add Teammate</button>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  // ---------------------------------------------------------------
  // SUPABASE CONFIG — fill in your anon public key below
  // ---------------------------------------------------------------
  const SUPABASE_URL = 'https://zhukywlioftxployvsyk.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpodWt5d2xpb2Z0eHBsb3l2c3lrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM4NDExNTAsImV4cCI6MjA5OTQxNzE1MH0.OJsfk7ZivxYY2pPO1kE6FBq3WTF39WRz2K7CT5Wlogg';
  // ---------------------------------------------------------------

  const TEAM_GOAL = 300;

  const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  const teammateListEl = document.getElementById('teammateList');
  const emptyStateEl = document.getElementById('emptyState');
  const totalValueEl = document.getElementById('totalValue');
  const remainingCardWrap = document.getElementById('remainingCardWrap');
  const remainingLabel = document.getElementById('remainingLabel');
  const remainingValueEl = document.getElementById('remainingValue');
  const progressFillEl = document.getElementById('progressFill');
  const progressPctEl = document.getElementById('progressPct');
  const addBtn = document.getElementById('addBtn');
  const statusDot = document.getElementById('statusDot');
  const statusText = document.getElementById('statusText');
  const toastEl = document.getElementById('toast');

  document.getElementById('targetValue').textContent = TEAM_GOAL.toLocaleString();

  let teammates = [];

  function formatNum(n) {
    return Number(n || 0).toLocaleString();
  }

  function showToast(message, isError) {
    toastEl.textContent = message;
    toastEl.className = 'toast show' + (isError ? ' error' : '');
    setTimeout(() => {
      toastEl.className = 'toast';
    }, 2200);
  }

  function setStatus(online, label) {
    statusDot.className = 'dot' + (online ? '' : ' offline');
    statusText.textContent = label;
  }

  function initials(name) {
    if (!name) return '?';
    const parts = name.trim().split(/\s+/);
    if (parts.length === 1) return parts[0].slice(0, 2).toUpperCase();
    return (parts[0][0] + parts[parts.length - 1][0]).toUpperCase();
  }

  function renderStats() {
    const total = teammates.reduce((sum, t) => sum + (Number(t.steps) || 0), 0);
    const remaining = TEAM_GOAL - total;
    const pct = Math.min(100, Math.max(0, (total / TEAM_GOAL) * 100));

    totalValueEl.textContent = formatNum(total);
    progressFillEl.style.width = pct + '%';
    progressPctEl.textContent = pct.toFixed(1) + '% complete';

    if (remaining <= 0) {
      remainingCardWrap.className = 'card remaining-card achieved';
      remainingLabel.textContent = '';
      remainingValueEl.textContent = 'Goal Achieved! 🎉';
    } else {
      remainingCardWrap.className = 'card';
      remainingLabel.textContent = 'Stairs Remaining';
      remainingValueEl.textContent = formatNum(remaining);
      remainingValueEl.className = 'card-value';
    }
  }

  function renderList() {
    teammateListEl.innerHTML = '';

    if (teammates.length === 0) {
      teammateListEl.appendChild(emptyStateEl);
      return;
    }

    const sorted = [...teammates].sort((a, b) => (b.steps || 0) - (a.steps || 0));

    sorted.forEach(t => {
      const row = document.createElement('div');
      row.className = 'teammate-row';
      row.dataset.id = t.id;

      const avatar = document.createElement('div');
      avatar.className = 'avatar';
      avatar.textContent = initials(t.name);

      const main = document.createElement('div');
      main.className = 'row-main';

      const nameInput = document.createElement('input');
      nameInput.className = 'name-field';
      nameInput.type = 'text';
      nameInput.value = t.name || '';
      nameInput.placeholder = 'Teammate name';
      nameInput.addEventListener('blur', () => {
        const newName = nameInput.value.trim() || 'Unnamed';
        if (newName !== t.name) {
          updateTeammate(t.id, { name: newName });
        }
      });
      nameInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') nameInput.blur();
      });

      main.appendChild(nameInput);

      const stepsInput = document.createElement('input');
      stepsInput.className = 'steps-field';
      stepsInput.type = 'number';
      stepsInput.setAttribute('inputmode', 'numeric');
      stepsInput.setAttribute('pattern', '[0-9]*');
      stepsInput.value = t.steps || 0;
      stepsInput.min = '0';
      stepsInput.addEventListener('blur', () => {
        let val = parseInt(stepsInput.value, 10);
        if (isNaN(val) || val < 0) val = 0;
        stepsInput.value = val;
        if (val !== t.steps) {
          updateTeammate(t.id, { steps: val });
        }
      });
      stepsInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') stepsInput.blur();
      });

      const clearBtn = document.createElement('button');
      clearBtn.className = 'clear-btn';
      clearBtn.textContent = '✕';
      clearBtn.setAttribute('aria-label', 'Reset steps to 0');
      clearBtn.addEventListener('click', () => {
        updateTeammate(t.id, { steps: 0 });
      });

      const deleteBtn = document.createElement('button');
      deleteBtn.className = 'delete-btn';
      deleteBtn.textContent = '🗑';
      deleteBtn.setAttribute('aria-label', 'Remove teammate');
      deleteBtn.addEventListener('click', () => {
        if (confirm(`Remove ${t.name || 'this teammate'} from the team?`)) {
          deleteTeammate(t.id);
        }
      });

      row.appendChild(avatar);
      row.appendChild(main);
      row.appendChild(stepsInput);
      row.appendChild(clearBtn);
      row.appendChild(deleteBtn);
      teammateListEl.appendChild(row);
    });
  }

  function render() {
    renderList();
    renderStats();
  }

  async function loadTeammates() {
    setStatus(false, 'Loading…');
    const { data, error } = await supabaseClient
      .from('teammates')
      .select('*')
      .order('id', { ascending: true });

    if (error) {
      console.error(error);
      setStatus(false, 'Connection error');
      showToast('Could not load teammates. Check your Supabase key.', true);
      return;
    }

    teammates = data || [];
    render();
    setStatus(true, 'Live');
  }

  async function addTeammate() {
    addBtn.disabled = true;
    const { error } = await supabaseClient
      .from('teammates')
      .insert([{ name: 'New Teammate', steps: 0 }]);

    addBtn.disabled = false;

    if (error) {
      console.error(error);
      showToast('Could not add teammate.', true);
    }
    // No local mutation needed — realtime subscription will pick it up.
    // Fallback in case realtime is delayed/unavailable:
    setTimeout(loadTeammates, 600);
  }

  async function updateTeammate(id, fields) {
    // Optimistic local update for snappy UI
    const idx = teammates.findIndex(t => t.id === id);
    if (idx !== -1) {
      teammates[idx] = { ...teammates[idx], ...fields };
      render();
    }

    const { error } = await supabaseClient
      .from('teammates')
      .update(fields)
      .eq('id', id);

    if (error) {
      console.error(error);
      showToast('Could not save change.', true);
      loadTeammates();
    }
  }

  async function deleteTeammate(id) {
    // Optimistic local removal
    teammates = teammates.filter(t => t.id !== id);
    render();

    const { error } = await supabaseClient
      .from('teammates')
      .delete()
      .eq('id', id);

    if (error) {
      console.error(error);
      showToast('Could not remove teammate.', true);
      loadTeammates();
    }
  }

  function upsertLocal(row) {
    const idx = teammates.findIndex(t => t.id === row.id);
    if (idx === -1) {
      teammates.push(row);
    } else {
      teammates[idx] = row;
    }
  }

  function removeLocal(id) {
    teammates = teammates.filter(t => t.id !== id);
  }

  function subscribeRealtime() {
    supabaseClient
      .channel('teammates-changes')
      .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'teammates' }, (payload) => {
        upsertLocal(payload.new);
        render();
      })
      .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'teammates' }, (payload) => {
        upsertLocal(payload.new);
        render();
      })
      .on('postgres_changes', { event: 'DELETE', schema: 'public', table: 'teammates' }, (payload) => {
        removeLocal(payload.old.id);
        render();
      })
      .subscribe((status) => {
        if (status === 'SUBSCRIBED') {
          setStatus(true, 'Live');
        } else if (status === 'CHANNEL_ERROR' || status === 'TIMED_OUT') {
          setStatus(false, 'Reconnecting…');
        } else if (status === 'CLOSED') {
          setStatus(false, 'Offline');
        }
      });
  }

  addBtn.addEventListener('click', addTeammate);

  loadTeammates();
  subscribeRealtime();
</script>
</body>
</html>
